<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Captions</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1e1e2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e0e0e0;
    }
    .card {
      text-align: center;
      padding: 40px;
    }
    h2 { margin: 0 0 8px; font-size: 18px; color: #fff; }
    p  { margin: 0; font-size: 13px; color: #666; line-height: 1.6; }
    .dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.25);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h2>Live Captions Active</h2>
    <p>Speech recognition is running.<br>This tab will close automatically when you stop captions.</p>
  </div>
  <script src="recognition.js"></script>
</body>
</html>
